<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/product_list.css">
</head>
<body>
    <!--nav bar-->
    <div class="nav-bar">
        <div class="nav-text">
            <p>Dog Toys</p>
            <p>Dog Treats</p>
            <p>Dog Shampoo</p>
        </div>
        <div class="nav-logo">
            <img src="images/icon/logo_icon.png" alt="logo">
        </div>
        <div class="nav-icon">
            <img src="images/icon/search_icon.png" alt="search-icon">
            <img src="images/icon/shopping_cart_icon.png" alt="shopping-cart-icon">
        </div>
    </div>

    <div class="breadcrumb-nav">
        <a href="index.html">
            <img class="home-icon" src="images/icon/home_icon.png" alt="home-icon">
        </a>
        <img class="breadcrumb-arrow" src="images/icon/breadcrumb_arrow.png" alt="breadcrumb-arrow">
        <p>Dog Toys</p>
    </div>

    <!--hero section-->
    <div class="hero-section">
        <div class="hero-text">
            <h1>Dog Toys.</h1>
            <p>Everything your dog needs - from care to playtime.</p>
        </div>
        <div class="hero-shopping">
            <button class="hero-tag">
                <img src="images/icon/toys-icon.png" alt="toys-icon">
                <p>Dog Toys</p>
            </button>
            <button class="hero-tag">
                <img src="images/icon/treats_icon.png" alt="treats-icon">
                <p>Dog Treats</p>
            </button>
            <button class="hero-tag">
                <img src="images/icon/shampoo_icon.png" alt="shampoo-icon">
                <p>Dog Shampoo</p>
            </button>
        </div>
    </div>
</body>
</html>
