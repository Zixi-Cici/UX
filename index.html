<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" type="text/css" href="css/components.css">
    <link rel="stylesheet" href="css/home_section.css">
</head>
<body>
    <heading>
        <!--nav bar-->
        <div class="nav-bar">
            <div class="nav-text">
                <p>Dog Toys</p>
                <p>Dog Treats</p>
                <p>Dog Shampoo</p>
            </div>
            <div class="nav-logo">
                <img src="images/icon/logo_icon.png" alt="logo">
            </div>
            <div class="nav-icon">
                <img src="images/icon/search_icon.png" alt="search-icon">
                <img src="images/icon/shopping_cart_icon.png" alt="shopping-cart-icon">
            </div>
        </div>

        <!--hero section-->
        <div class="hero-section">
            <div class="hero-text">
                <h1>Play. Clean. Reward.</h1>
                <p>Everything your dog needs - from care to playtime.</p>
            </div>
            <button class="hero-button">
                <p>Shop Now</p>
                <img src="images/icon/hero-arrow.png" alt="hero-arrow">
            </button>
            <div class="hero-shopping">
                <button class="hero-tag">
                    <img src="images/icon/toys-icon.png" alt="toys-icon">
                    <p>Dog Toys</p>
                </button>
                <button class="hero-tag">
                    <img src="images/icon/treats_icon.png" alt="treats-icon">
                    <p>Dog Treats</p>
                </button>
                <button class="hero-tag">
                    <img src="images/icon/shampoo_icon.png" alt="shampoo-icon">
                    <p>Dog Shampoo</p>
                </button>
            </div>

        </div>
    </heading>
</body>
</html>
